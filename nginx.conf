user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # IMPORTANT for Collabora: do NOT collapse // into /
    # Collabora uses URLs like /cool/https://<host>/... in the path.
    merge_slashes off;

    # Required for large Nextcloud uploads (10 GB)
    client_max_body_size 10240M;

    # Extend timeouts for long uploads
    proxy_read_timeout 3600;
    proxy_connect_timeout 3600;
    proxy_send_timeout 3600;

    # Proper WebSocket Connection header handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream nextcloud {
        server app:80;
    }

    upstream collabora {
        server collabora:9980;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Enforce HTTPS (handled by Tailscale)
        # Only redirect if the header explicitly says "http".
        # If the header is missing (e.g. Collabora container), do NOT redirect.
        if ($http_x_forwarded_proto = "http") {
            return 301 https://$host$request_uri;
        }

        # ---- Collabora (Nextcloud Office) ----

        location ^~ /hosting/discovery {
            proxy_pass http://collabora;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
        }

        location ^~ /hosting/capabilities {
            proxy_pass http://collabora;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
        }

        location ^~ /loleaflet {
            proxy_pass http://collabora;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
        }

        location ^~ /browser {
            proxy_pass http://collabora;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
        }

        # WebSocket endpoint (critical)
        # Keep /cool/ prefix and preserve the rest of the URI exactly.
        location ^~ /cool/ {
            proxy_pass http://collabora;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 36000s;
            proxy_send_timeout 36000s;

            proxy_buffering off;
        }
        # ---- Nextcloud ----

        location / {
            proxy_pass http://nextcloud;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tailscale terminates TLS, so we tell Nextcloud it's HTTPS
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffering off;

            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
    }
}


